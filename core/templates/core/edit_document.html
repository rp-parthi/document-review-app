{% extends 'core/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Edit Document</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Document Title</label>
                <input type="text" name="title" value="{{ document.title }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">File (leave empty to keep existing)</label>
                <input type="file" name="file" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Assign to Reviewer</label>
                <select name="assigned_to" class="form-select" required>
                    {% for reviewer in reviewers %}
                        <option value="{{ reviewer.id }}"
                            {% if reviewer == document.assigned_to %}selected{% endif %}>
                            {{ reviewer.username }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" name="action" value="draft" class="btn btn-secondary">Save as Draft</button>
                <button type="submit" name="action" value="submit" class="btn btn-primary">Submit for Review</button>
                <a href="{% url 'document_detail' document.id %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
